<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Completion Search</title>
    <!-- Link CSS file from static folder -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="search-container">
            <h1>Auto-Completion Search</h1>
            
            <!-- Search input field -->
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-input" 
                    placeholder="Type to search... (e.g., apple, banana, car)"
                    autocomplete="off"
                >
                
                <!-- Suggestions dropdown list -->
                <ul id="suggestionsList" class="suggestions-list"></ul>
            </div>
            
            <!-- Display selected item -->
            <div id="selectedItem" class="selected-item"></div>
        </div>
    </div>

    <!-- Link JavaScript file from static folder -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
